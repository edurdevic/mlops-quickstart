resources:
  jobs:
    model_deployment_job:
      name: "2.2 - Iris Model Deployment Job - ${var.environment}"
      description: "Job to evaluate, approve, and deploy iris classification model"
      
      # TODO: Set up email notifications on failure
      # email_notifications:
      #   on_failure:
      #     - "your.name@address.com" 
      #   no_alert_for_skipped_runs: false
      
      # Job parameters
      parameters:
        - name: "model_name"
          default: "${var.catalog_name}.${var.schema_name}.iris_model"
        - name: "model_version"
          default: "1"

      
      # Job tasks with dependencies
      tasks:
        - task_key: "evaluation"
          description: "Evaluate model performance before deployment"
          
          # Notebook task
          notebook_task:
            notebook_path: "../notebooks/2_model_training_and_deployment/model_deployment/1_model_evaluation.ipynb"
            base_parameters:
              model_name: "{{job.parameters.model_name}}"
              model_version: "{{job.parameters.model_version}}"
              deployment_job_id: "{{job.id}}"
              
        - task_key: "approval"
          description: "Approve model for deployment based on evaluation results"
          depends_on:
            - task_key: "evaluation"
          
          # Notebook task
          notebook_task:
            notebook_path: "../notebooks/2_model_training_and_deployment/model_deployment/2_model_approval.ipynb"
            base_parameters:
              model_name: "{{job.parameters.model_name}}"
              model_version: "{{job.parameters.model_version}}"

        
        - task_key: "deployment"
          description: "Deploy approved model to production endpoint"
          depends_on:
            - task_key: "approval"
          
          # Notebook task
          notebook_task:
            notebook_path: "../notebooks/2_model_training_and_deployment/model_deployment/3_model_deployment.ipynb"
            base_parameters:
              model_name: "{{job.parameters.model_name}}"
              model_version: "{{job.parameters.model_version}}"
      
      # Timeout and retry settings
      timeout_seconds: 3600
      max_concurrent_runs: 1
      
      # Tags for organization
      tags:
        Environment: "${var.environment}"
        Project: "mlops-quickstart"
