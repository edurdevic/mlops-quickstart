  prod:
    mode: production
    workspace:
      # TODO: Set your prod workspace host (otherwise, use profiles defined in your CD deployment pipeline e.g. .github/workflows/deploy.yml or ./azure-pipelines.yml)
      # host: https://<your-workspace>.cloud.databricks.com
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
    variables:
      # TODO: Set catalog_name/schema_name to your own Unity Catalog catalog and schema
      catalog_name: mlops_quickstart_prod
